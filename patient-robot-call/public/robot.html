<!doctype html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Robot</title>
	<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
	<style>
		body { font-family: system-ui, Arial, sans-serif; margin: 1rem; }
		#videos { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
		video { width: 100%; background: #000; border-radius: 8px; }
		.controls { display: grid; gap: .5rem; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-bottom: 1rem; }
		label { display: flex; flex-direction: column; gap: .25rem; }
		button { padding: .5rem .75rem; font-size: 1rem; }
	</style>
</head>
<body>
	<h2>Robot</h2>
	<div class="controls">
		<label>Room
			<input id="room" value="ward-1" />
		</label>
		<div>
			<button id="join">Join and Auto-Answer</button>
			<button id="leave" disabled>Leave</button>
		</div>
	</div>
	<div id="videos">
		<video id="local" autoplay muted playsinline></video>
		<video id="remote" autoplay playsinline></video>
	</div>

	<script type="module">
		const socket = io()
		const localVideo = document.getElementById('local')
		const remoteVideo = document.getElementById('remote')
		const roomInput = document.getElementById('room')
		const joinBtn = document.getElementById('join')
		const leaveBtn = document.getElementById('leave')

		let pc, localStream
		let iceServers = []

		async function loadIce() {
			const res = await fetch('/ice-config')
			const cfg = await res.json()
			iceServers = cfg.iceServers
		}

		function createPeer() {
			pc = new RTCPeerConnection({ iceServers })
			pc.onicecandidate = e => {
				if (e.candidate) socket.emit('candidate', { candidate: e.candidate })
			}
			pc.ontrack = e => { remoteVideo.srcObject = e.streams[0] }
		}

		async function join() {
			await loadIce()
			createPeer()
			// Robot sends video+audio from Pi camera and mic
			const constraints = { video: true, audio: true }
			localStream = await navigator.mediaDevices.getUserMedia(constraints)
			localStream.getTracks().forEach(t => pc.addTrack(t, localStream))
			localVideo.srcObject = localStream
			socket.emit('join', { room: roomInput.value, role: 'robot' })
			joinBtn.disabled = true; leaveBtn.disabled = false
		}

		function leave() {
			if (pc) pc.close()
			if (localStream) localStream.getTracks().forEach(t => t.stop())
			joinBtn.disabled = false; leaveBtn.disabled = true
		}

		socket.on('offer', async ({ sdp, type }) => {
			if (!pc) return
			await pc.setRemoteDescription({ sdp, type })
			const answer = await pc.createAnswer()
			await pc.setLocalDescription(answer)
			socket.emit('answer', { sdp: answer.sdp, type: answer.type })
		})

		socket.on('candidate', async ({ candidate }) => {
			try { candidate && pc && await pc.addIceCandidate(candidate) } catch {}
		})

		joinBtn.onclick = join
		leaveBtn.onclick = leave
	</script>
</body>
</html>

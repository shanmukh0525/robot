<!doctype html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Operator</title>
	<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
	<style>
		body { font-family: system-ui, Arial, sans-serif; margin: 1rem; }
		#videos { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
		video { width: 100%; background: #000; border-radius: 8px; }
		.controls { display: grid; gap: .5rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-bottom: 1rem; }
		label { display: flex; flex-direction: column; gap: .25rem; }
		button { padding: .5rem .75rem; font-size: 1rem; }
	</style>
</head>
<body>
	<h2>Operator</h2>
	<div class="controls">
		<label>Room
			<input id="room" value="ward-1" />
		</label>
		<label>Camera
			<select id="camera"></select>
		</label>
		<label>Microphone
			<select id="microphone"></select>
		</label>
		<div>
			<button id="connect">Connect</button>
			<button id="disconnect" disabled>Disconnect</button>
		</div>
		<div>
			<button id="toggleVideo" disabled>Toggle Camera</button>
			<button id="toggleAudio" disabled>Toggle Mic</button>
		</div>
	</div>
	<div id="videos">
		<video id="local" autoplay muted playsinline></video>
		<video id="remote" autoplay playsinline></video>
	</div>

	<script type="module">
		const socket = io()
		const localVideo = document.getElementById('local')
		const remoteVideo = document.getElementById('remote')
		const roomInput = document.getElementById('room')
		const connectBtn = document.getElementById('connect')
		const disconnectBtn = document.getElementById('disconnect')
		const cameraSel = document.getElementById('camera')
		const micSel = document.getElementById('microphone')
		const toggleVideoBtn = document.getElementById('toggleVideo')
		const toggleAudioBtn = document.getElementById('toggleAudio')

		// Allow ?room=foo to prefill
		const params = new URLSearchParams(location.search)
		if (params.get('room')) roomInput.value = params.get('room')

		let pc, localStream
		let makingOffer = false
		let ignoreOffer = false
		let polite = false
		let iceServers = []

		async function loadIce() {
			const res = await fetch('/ice-config')
			const cfg = await res.json()
			iceServers = cfg.iceServers
		}

		async function listDevices() {
			try {
				await navigator.mediaDevices.getUserMedia({ audio: true, video: true })
			} catch {}
			const devices = await navigator.mediaDevices.enumerateDevices()
			cameraSel.innerHTML = ''
			micSel.innerHTML = ''
			for (const d of devices) {
				if (d.kind === 'videoinput') {
					const o = document.createElement('option'); o.value = d.deviceId; o.textContent = d.label || `Camera ${cameraSel.length+1}`; cameraSel.appendChild(o)
				}
				if (d.kind === 'audioinput') {
					const o = document.createElement('option'); o.value = d.deviceId; o.textContent = d.label || `Mic ${micSel.length+1}`; micSel.appendChild(o)
				}
			}
		}

		function createPeer() {
			pc = new RTCPeerConnection({ iceServers })
			pc.onicecandidate = e => { if (e.candidate) socket.emit('candidate', { candidate: e.candidate }) }
			pc.ontrack = e => { remoteVideo.srcObject = e.streams[0] }
			pc.onnegotiationneeded = async () => {
				try {
					makingOffer = true
					await pc.setLocalDescription(await pc.createOffer())
					socket.emit('offer', { sdp: pc.localDescription.sdp, type: pc.localDescription.type })
				} catch (err) {
					console.error(err)
				} finally {
					makingOffer = false
				}
			}
		}

		async function getMedia() {
			const constraints = {
				video: { deviceId: cameraSel.value ? { exact: cameraSel.value } : undefined },
				audio: { deviceId: micSel.value ? { exact: micSel.value } : undefined }
			}
			localStream = await navigator.mediaDevices.getUserMedia(constraints)
			localStream.getTracks().forEach(t => pc.addTrack(t, localStream))
			localVideo.srcObject = localStream
		}

		async function connect() {
			await loadIce()
			createPeer()
			await getMedia()
			socket.emit('join', { room: roomInput.value, role: 'operator' })
			connectBtn.disabled = true; disconnectBtn.disabled = false
			toggleVideoBtn.disabled = false; toggleAudioBtn.disabled = false
		}

		function disconnect() {
			socket.emit('leave')
			if (pc) pc.close()
			if (localStream) localStream.getTracks().forEach(t => t.stop())
			connectBtn.disabled = false; disconnectBtn.disabled = true
			toggleVideoBtn.disabled = true; toggleAudioBtn.disabled = true
		}

		socket.on('joined', ({ polite: p }) => { polite = p })

		socket.on('offer', async ({ sdp, type }) => {
			const offer = { sdp, type }
			const offerCollision = makingOffer || pc.signalingState !== 'stable'
			ignoreOffer = !polite && offerCollision
			if (ignoreOffer) return
			try {
				await pc.setRemoteDescription(offer)
				await pc.setLocalDescription(await pc.createAnswer())
				socket.emit('answer', { sdp: pc.localDescription.sdp, type: pc.localDescription.type })
			} catch (err) { console.error(err) }
		})

		socket.on('answer', async ({ sdp, type }) => {
			try { await pc.setRemoteDescription({ sdp, type }) } catch (err) { console.error(err) }
		})

		socket.on('candidate', async ({ candidate }) => {
			try { if (candidate) await pc.addIceCandidate(candidate) } catch (err) {
				if (!ignoreOffer) console.error(err)
			}
		})

		socket.on('peer-left', () => { remoteVideo.srcObject = null })
		socket.on('room-full', () => alert('Room is full (2 participants max)'))

		toggleVideoBtn.onclick = () => {
			const track = localStream?.getVideoTracks()[0]
			if (!track) return
			track.enabled = !track.enabled
			toggleVideoBtn.textContent = track.enabled ? 'Turn Camera Off' : 'Turn Camera On'
		}
		toggleAudioBtn.onclick = () => {
			const track = localStream?.getAudioTracks()[0]
			if (!track) return
			track.enabled = !track.enabled
			toggleAudioBtn.textContent = track.enabled ? 'Mute Mic' : 'Unmute Mic'
		}

		connectBtn.onclick = connect
		disconnectBtn.onclick = disconnect

		await listDevices()
	</script>
</body>
</html>

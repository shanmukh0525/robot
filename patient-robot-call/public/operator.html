<!doctype html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Operator</title>
	<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
	<style>
		body { font-family: system-ui, Arial, sans-serif; margin: 1rem; }
		#videos { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
		video { width: 100%; background: #000; border-radius: 8px; }
		.controls { display: grid; gap: .5rem; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-bottom: 1rem; }
		label { display: flex; flex-direction: column; gap: .25rem; }
		button { padding: .5rem .75rem; font-size: 1rem; }
	</style>
</head>
<body>
	<h2>Operator</h2>
	<div class="controls">
		<label>Room
			<input id="room" value="ward-1" />
		</label>
		<label>Camera
			<select id="camera"></select>
		</label>
		<label>Microphone
			<select id="microphone"></select>
		</label>
		<div>
			<button id="start">Start Call</button>
			<button id="hangup" disabled>Hang Up</button>
		</div>
	</div>
	<div id="videos">
		<video id="local" autoplay muted playsinline></video>
		<video id="remote" autoplay playsinline></video>
	</div>

	<script type="module">
		const socket = io()
		const localVideo = document.getElementById('local')
		const remoteVideo = document.getElementById('remote')
		const roomInput = document.getElementById('room')
		const startBtn = document.getElementById('start')
		const hangupBtn = document.getElementById('hangup')
		const cameraSel = document.getElementById('camera')
		const micSel = document.getElementById('microphone')

		let pc, localStream
		let iceServers = []

		async function loadIce() {
			const res = await fetch('/ice-config')
			const cfg = await res.json()
			iceServers = cfg.iceServers
		}

		async function listDevices() {
			await navigator.mediaDevices.getUserMedia({ audio: true, video: true })
			const devices = await navigator.mediaDevices.enumerateDevices()
			cameraSel.innerHTML = ''
			micSel.innerHTML = ''
			for (const d of devices) {
				if (d.kind === 'videoinput') {
					const o = document.createElement('option'); o.value = d.deviceId; o.textContent = d.label || `Camera ${cameraSel.length+1}`; cameraSel.appendChild(o)
				}
				if (d.kind === 'audioinput') {
					const o = document.createElement('option'); o.value = d.deviceId; o.textContent = d.label || `Mic ${micSel.length+1}`; micSel.appendChild(o)
				}
			}
		}

		function createPeer() {
			pc = new RTCPeerConnection({ iceServers })
			pc.onicecandidate = e => {
				if (e.candidate) socket.emit('candidate', { candidate: e.candidate })
			}
			pc.ontrack = e => { remoteVideo.srcObject = e.streams[0] }
		}

		async function start() {
			await loadIce()
			createPeer()
			const constraints = { video: { deviceId: cameraSel.value ? { exact: cameraSel.value } : undefined }, audio: { deviceId: micSel.value ? { exact: micSel.value } : undefined } }
			localStream = await navigator.mediaDevices.getUserMedia(constraints)
			localStream.getTracks().forEach(t => pc.addTrack(t, localStream))
			localVideo.srcObject = localStream
			socket.emit('join', { room: roomInput.value, role: 'operator' })
			socket.emit('ready', {})
			const offer = await pc.createOffer()
			await pc.setLocalDescription(offer)
			socket.emit('offer', { sdp: offer.sdp, type: offer.type })
			startBtn.disabled = true; hangupBtn.disabled = false
		}

		function hangup() {
			if (pc) pc.close()
			if (localStream) localStream.getTracks().forEach(t => t.stop())
			startBtn.disabled = false; hangupBtn.disabled = true
		}

		socket.on('answer', async ({ sdp, type }) => {
			if (!pc) return
			await pc.setRemoteDescription({ sdp, type })
		})

		socket.on('candidate', async ({ candidate }) => {
			try { candidate && pc && await pc.addIceCandidate(candidate) } catch {}
		})

		startBtn.onclick = start
		hangupBtn.onclick = hangup

		await listDevices()
	</script>
</body>
</html>
